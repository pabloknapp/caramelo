<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <title>Chef Caramelo</title>
    <link rel="icon" href="favico.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind-config.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { animate, stagger } from "https://cdn.jsdelivr.net/npm/motion@11.11.13/+esm";
        window.animateDOM = animate;
        window.staggerDOM = stagger;
    </script>
    <link rel="stylesheet" href="styles.css">
</head>

<body
    class="bg-surface-muted min-h-screen font-sans text-text-main flex flex-col items-center justify-center py-12 px-4 selection:bg-primary selection:text-white">

    <header class="w-full max-w-5xl mb-8 flex flex-col items-center text-center">
        <div class="flex items-center gap-4 mb-4">
            <div
                class="w-20 h-20 rounded-2xl bg-primary flex items-center justify-center shrink-0 overflow-hidden border-2 border-primary">
                <img src="caramelo.png" alt="Logo Caramelo" class="w-full h-full object-cover">
            </div>
            <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight text-text-main">Chef Caramelo</h1>
        </div>
        <p class="text-xl text-text-muted max-w-2xl mt-2 mb-16">O melhor amigo do homem agora na cozinha, pronto para
            te ensinar a preparar qualquer receita culinária!</p>
    </header>

    <main class="w-full max-w-5xl bg-white rounded-3xl p-8 md:p-12 custom-shadow relative">

        <section class="">
            <div class="relative group">
                <textarea id="prompt"
                    class="w-full bg-white border-2 border-surface-border/40 focus:border-primary rounded-2xl p-6 pr-16 text-md text-text-main placeholder:text-text-muted/70 outline-none resize-none transition-all duration-300 min-h-[140px] input-shadow"
                    placeholder="O que vamos cozinhar hoje? Se estiver sem ideias, mande seus ingredientes e eu encontrarei a melhor receita"></textarea>

                <button id="send-btn" onclick="enviar()"
                    class="absolute bottom-6 right-6 bg-primary text-white p-3 rounded-xl flex items-center justify-center">
                    <i data-lucide="send-horizontal" class="w-6 h-6"></i>
                </button>
            </div>
        </section>

        <div id="loading-state" class="hidden flex items-center justify-center py-12 gap-4">
            <div
                class="shrink-0 w-12 h-12 rounded-full border-2 border-primary overflow-hidden flex items-center justify-center">
                <img src="caramelo.png" alt="Chef Caramelo" class="w-full h-full object-cover">
            </div>
            <div
                class="flex items-center gap-3 bg-surface-muted py-3 px-5 rounded-2xl rounded-bl-none border border-surface-border/30">
                <p class="text-text-main font-medium animate-pulse">O Chef Caramelo está preparando sua receita...</p>
                <i data-lucide="loader-2" class="w-5 h-5 animate-spin text-primary shrink-0"></i>
            </div>
        </div>

        <div id="error-state"
            class="hidden bg-red-50 border border-red-200 text-red-600 rounded-xl p-4 flex items-center gap-3 mt-6">
            <i data-lucide="alert-circle" class="w-6 h-6 shrink-0"></i>
            <p id="error-message" class="font-medium"></p>
        </div>

        <section id="resposta-container"
            class="hidden flex flex-col gap-10 opacity-100 transition-opacity duration-500">

            <div class="flex flex-col gap-6 my-6" id="mensagens-chat">
            </div>

            <div id="cartao-info-prato"
                class="bg-white border border-surface-border/40 rounded-2xl p-6 card-shadow flex flex-col sm:flex-row sm:items-center justify-between gap-4 opacity-0">
                <div class="flex-1">
                    <h2 id="nome-prato" class="text-2xl md:text-3xl font-extrabold text-text-main leading-tight"></h2>
                </div>
                <div
                    class="bg-surface-muted border border-surface-border/30 rounded-xl py-3 px-5 flex items-center gap-2 shrink-0 self-start sm:self-auto card-shadow">
                    <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0">
                        <i data-lucide="clock" class="text-muted w-5 h-5"></i>
                    </div>
                    <div>
                        <span class="text-xs text-text-muted block font-medium">Tempo estimado de Preparo</span>
                        <span id="tempo-preparo-prato" class="text-base font-bold text-text-main"></span>
                    </div>
                </div>
            </div>

            <div id="layout-receita" class="grid grid-cols-1 md:grid-cols-12 gap-8">

                <div class="md:col-span-4 flex flex-col gap-8">
                    <div
                        class="bg-[#fefce8] rounded-r-xl border-l-8 border-[#fcd34d] p-6 relative post-it-shadow self-start w-full">
                        <div class="flex items-center gap-3 mb-6">
                            <i data-lucide="shopping-basket" class="text-[#ca8a04]"></i>
                            <h3 class="text-xl font-bold text-[#854d0e]">Ingredientes</h3>
                        </div>
                        <ul id="ingredientes-list"
                            class="space-y-3 font-medium text-text-main notepad-lines min-h-[200px]">
                        </ul>
                    </div>

                    <div id="layout-dicas" class="flex justify-center w-full">
                        <div id="wrapper-dica" class="opacity-0 w-full">
                            <div
                                class="bg-[#fef08a] w-full p-6 rounded-sm relative transform -rotate-1 transition-transform duration-300 hover:rotate-0 post-it-shadow">
                                <div class="post-it-pin bg-[#ef4444]"></div>
                                <div class="flex items-center gap-2 mb-3 mt-2">
                                    <i data-lucide="lightbulb" class="text-[#ca8a04] w-5 h-5"></i>
                                    <h4 class="font-bold text-[#854d0e]">Dica de Ouro</h4>
                                </div>
                                <p id="dica-chefe" class="text-[#713f12] font-medium leading-relaxed"></p>
                            </div>
                        </div>
                    </div>
                </div>

                <div
                    class="md:col-span-8 bg-white border border-surface-border/40 rounded-2xl p-8 card-shadow self-start">
                    <div class="flex items-center gap-3 mb-8">
                        <i data-lucide="utensils-crossed" class="text-primary"></i>
                        <h3 class="text-2xl font-bold text-text-main">Modo de Preparo</h3>
                    </div>
                    <div id="receita-list" class="flex flex-col gap-6">
                    </div>
                </div>

            </div>

        </section>
    </main>

    <script>
        lucide.createIcons();

        function showElement(id) {
            const el = document.getElementById(id);
            if (el) {
                el.classList.remove("hidden");
                el.style.display = "";
            }
        }

        function hideElement(id) {
            const el = document.getElementById(id);
            if (el) el.classList.add("hidden");
        }

        function renderizarMensagemChat(text) {
            return `
                <div class="chat-msg opacity-0 flex gap-4 items-end">
                    <div class="shrink-0 w-12 h-12 rounded-full bg-primary flex items-center justify-center mb-2 overflow-hidden border-2 border-primary">
                        <img src="caramelo.png" alt="Caramelo" class="w-full h-full object-cover">
                    </div>
                    <div class="bg-surface-muted rounded-2xl rounded-bl-none p-5 max-w-[85%] border border-surface-border/30 text-lg">
                        <p class="text-text-main leading-relaxed">${text}</p>
                    </div>
                </div>
            `;
        }

        function renderizarPasso(index, text) {
            const textoLimpo = text.replace(/^\s*(?:Passo\s*)?\d+[\.\-\):]\s*/i, "");
            return `
                <div class="passo-receita opacity-0 flex gap-5 items-start">
                    <div class="shrink-0 w-12 h-12 rounded-full border-2 border-primary text-text-main flex items-center justify-center font-bold text-xl card-shadow">
                        ${index + 1}
                    </div>
                    <div class="flex-1 pt-1.5">
                        <p class="text-text-main leading-relaxed text-lg">${textoLimpo}</p>
                    </div>
                </div>
            `;
        }

        async function enviar() {
            const promptInput = document.getElementById("prompt");
            const prompt = promptInput.value;
            hideElement("error-state");
            hideElement("resposta-container");
            showElement("loading-state");
            const sendBtn = document.getElementById("send-btn");
            sendBtn.disabled = true;
            sendBtn.classList.add("opacity-50", "cursor-not-allowed");

            try {
                const response = await fetch("/api/llm", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt })
                });
                const data = await response.json();

                hideElement("loading-state");

                if (!response.ok || data.erro) {
                    document.getElementById("error-message").textContent = data.erro || "Erro desconhecido.";
                    showElement("error-state");
                    return;
                }

                const receita = data.receita;
                if (receita.erro_personagem) {
                    const mensagensChat = document.getElementById("mensagens-chat");
                    mensagensChat.innerHTML = renderizarMensagemChat(receita.erro_personagem);
                    hideElement("cartao-info-prato");
                    hideElement("layout-receita");
                    hideElement("layout-dicas");
                    showElement("resposta-container");
                    lucide.createIcons();
                    if (window.animateDOM) {
                        window.animateDOM(".chat-msg", { opacity: [0, 1], y: [20, 0] }, { duration: 0.5 });
                    }
                    return;
                }
                showElement("cartao-info-prato");
                showElement("layout-receita");
                showElement("layout-dicas");
                document.getElementById("nome-prato").textContent = receita.nome_prato;
                document.getElementById("tempo-preparo-prato").textContent = receita.tempo_preparo;
                const mensagensChat = document.getElementById("mensagens-chat");
                mensagensChat.innerHTML = "";
                if (receita.entrada_caramelo) {
                    mensagensChat.innerHTML += renderizarMensagemChat(receita.entrada_caramelo);
                }
                if (receita.detalhes_prato) {
                    mensagensChat.innerHTML += renderizarMensagemChat(receita.detalhes_prato);
                }
                const listaIngredientes = document.getElementById("ingredientes-list");
                listaIngredientes.innerHTML = "";
                (receita.ingredientes || []).forEach((ing, index) => {
                    const id = `ing-${index}`;
                    const li = document.createElement("li");
                    li.className = "ing-item opacity-0 flex items-start gap-3 text-lg";
                    li.innerHTML = `
                        <div class="relative flex items-center justify-center shrink-0 mt-1 w-5 h-5">
                            <input type="checkbox" id="${id}" class="peer absolute w-full h-full opacity-0 cursor-pointer z-10">
                            <div class="absolute inset-0 rounded-full border-2 border-surface-border peer-checked:bg-primary peer-checked:border-primary transition-colors"></div>
                            <svg class="absolute w-3.5 h-3.5 text-white opacity-0 peer-checked:opacity-100 transition-opacity pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                            </svg>
                        </div>
                        <label for="${id}" class="cursor-pointer select-none transition-all text-text-main">${ing}</label>
                    `;
                    listaIngredientes.appendChild(li);
                });
                const listaReceita = document.getElementById("receita-list");
                listaReceita.innerHTML = "";
                (receita.receita || []).forEach((passo, index) => {
                    listaReceita.innerHTML += renderizarPasso(index, passo);
                });
                document.getElementById("dica-chefe").textContent = receita.dica_do_chefe || "O Chef não tem dicas extras hoje!";
                lucide.createIcons();
                showElement("resposta-container");
                if (window.animateDOM && window.staggerDOM) {
                    window.animateDOM(".chat-msg", { opacity: [0, 1], y: [20, 0] }, { duration: 0.5, delay: window.staggerDOM(0.2) });
                    window.animateDOM("#cartao-info-prato", { opacity: [0, 1], y: [20, 0] }, { duration: 0.5, delay: 0.3 });
                    window.animateDOM(".ing-item", { opacity: [0, 1], x: [-20, 0] }, { duration: 0.4, delay: window.staggerDOM(0.1, { start: 0.5 }) });
                    window.animateDOM(".passo-receita", { opacity: [0, 1], y: [20, 0] }, { duration: 0.4, delay: window.staggerDOM(0.15, { start: 0.9 }) });
                    window.animateDOM("#wrapper-dica", { opacity: [0, 1], scale: [0.95, 1], y: [15, 0] }, { duration: 0.5, delay: 1.6 });
                }

            } catch (error) {
                hideElement("loading-state");
                document.getElementById("error-message").textContent = "Erro ao conectar com a API local.";
                showElement("error-state");
            } finally {
                sendBtn.disabled = false;
                sendBtn.classList.remove("opacity-50", "cursor-not-allowed");
            }
        }


        document.getElementById("ingredientes-list").addEventListener("change", function (e) {
            if (e.target && e.target.type === "checkbox") {
                const label = e.target.closest("li").querySelector("label");
                if (e.target.checked) {
                    label.classList.remove("text-text-main");
                    label.classList.add("text-text-muted", "line-through");
                } else {
                    label.classList.add("text-text-main");
                    label.classList.remove("text-text-muted", "line-through");
                }
            }
        });
    </script>
</body>

</html>
